<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="SalesAgent — AI-powered cold email outreach platform with Gemini research and personalized campaigns." />
    <title>SalesAgent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
      :root {
        /* Backgrounds — layered depth */
        --bg-base:       #080a0f;
        --bg-surface:    #0e1117;
        --bg-elevated:   #141923;
        --bg-input:      #0d1016;

        /* Borders */
        --border-subtle: #1e2433;
        --border-active: #2a3550;
        --border-accent: #1a4fcc;

        /* Text */
        --text-primary:  #e8eaf0;
        --text-secondary:#8b93a8;
        --text-muted:    #4a5266;

        /* Brand */
        --blue-primary:  #1a5cf5;
        --blue-hover:    #2366ff;
        --blue-subtle:   #0f2d66;
        --blue-glow:     rgba(26,92,245,0.15);

        /* Status */
        --status-new:    #1e2433;
        --status-new-text: #8b93a8;
        --status-contacted: #0f2d4a;
        --status-contacted-text: #4a9eff;
        --status-replied: #0a2a1e;
        --status-replied-text: #34d399;

        /* Typography */
        --font-sans: 'DM Sans', system-ui, -apple-system, sans-serif;
        --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
      }

      body {
        font-family: var(--font-sans);
        background-color: var(--bg-base);
        color: var(--text-primary);
        margin: 0;
        padding: 0;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      * { box-sizing: border-box; }

      /* ── Card ──────────────────────────────────────── */
      .sa-card {
        background: var(--bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: 8px;
      }

      /* ── Button: Primary ───────────────────────────── */
      .sa-btn-primary {
        background: var(--blue-primary);
        color: #fff;
        border: none;
        border-radius: 6px;
        padding: 9px 18px;
        font-size: 14px;
        font-weight: 500;
        font-family: var(--font-sans);
        cursor: pointer;
        transition: background 0.15s ease, transform 0.1s ease;
        letter-spacing: -0.01em;
      }
      .sa-btn-primary:hover { background: var(--blue-hover); }
      .sa-btn-primary:active { transform: scale(0.99); }
      .sa-btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

      /* ── Button: Ghost ─────────────────────────────── */
      .sa-btn-ghost {
        background: transparent;
        color: var(--text-secondary);
        border: 1px solid var(--border-subtle);
        border-radius: 6px;
        padding: 9px 18px;
        font-size: 14px;
        font-weight: 500;
        font-family: var(--font-sans);
        cursor: pointer;
        transition: border-color 0.15s, color 0.15s;
      }
      .sa-btn-ghost:hover {
        border-color: var(--border-active);
        color: var(--text-primary);
      }

      /* ── Input ──────────────────────────────────────── */
      .sa-input {
        background: var(--bg-input);
        border: 1px solid var(--border-subtle);
        border-radius: 6px;
        color: var(--text-primary);
        font-family: var(--font-sans);
        font-size: 14px;
        padding: 9px 12px;
        width: 100%;
        box-sizing: border-box;
        transition: border-color 0.15s, box-shadow 0.15s;
        outline: none;
      }
      .sa-input:focus {
        border-color: var(--border-accent);
        box-shadow: 0 0 0 3px var(--blue-glow);
      }
      .sa-input::placeholder { color: var(--text-muted); }

      /* ── Label ──────────────────────────────────────── */
      .sa-label {
        display: block;
        font-size: 12px;
        font-weight: 500;
        color: var(--text-secondary);
        letter-spacing: 0.02em;
        text-transform: uppercase;
        margin-bottom: 6px;
      }

      /* ── Divider ────────────────────────────────────── */
      .sa-divider {
        border: none;
        border-top: 1px solid var(--border-subtle);
        margin: 24px 0;
      }

      /* ── Animations ─────────────────────────────────── */
      @keyframes sa-fade-in {
        from { opacity: 0; transform: translateY(6px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .sa-fade-in {
        animation: sa-fade-in 0.25s ease forwards;
      }

      @keyframes sa-pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.4; }
      }
      .sa-pulse { animation: sa-pulse 1.5s ease-in-out infinite; }

      @keyframes sa-spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      .sa-spin { animation: sa-spin 0.8s linear infinite; }

      @keyframes sa-shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-4px); }
        75% { transform: translateX(4px); }
      }
      .sa-shake { animation: sa-shake 0.3s ease; }

      /* ── Scrollbar (dark) ───────────────────────────── */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: var(--bg-base); }
      ::-webkit-scrollbar-thumb { background: var(--border-subtle); border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--border-active); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
